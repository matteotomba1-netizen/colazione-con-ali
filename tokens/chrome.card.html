<!-- @dsCard group="Colors" viewport="700x150" name="Chrome & glass" subtitle="Black/white chrome + glass-morphism" -->
<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:20px}
.row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.sw{width:96px}
.chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,0.08)}
.nm{font-size:12px;font-variation-settings:'wght' 480;margin-top:7px}
.hx{font-family:var(--font-mono);font-size:10px;color:var(--grey-40)}
.glass{height:64px;border-radius:10px;background:var(--grad-sunrise);display:grid;place-items:center}
.glass span{width:64px;height:40px;border-radius:8px;background:var(--glass-light);border:1px solid var(--glass-border);backdrop-filter:blur(8px)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--black)"></div><div class="nm">Black</div><div class="hx">#000000</div></div>
<div class="sw"><div class="chip" style="background:var(--grey-60)"></div><div class="nm">Grey 60</div><div class="hx">#5A5A5A</div></div>
<div class="sw"><div class="chip" style="background:var(--grey-40)"></div><div class="nm">Grey 40</div><div class="hx">#8A8A8A</div></div>
<div class="sw"><div class="chip" style="background:var(--grey-20)"></div><div class="nm">Grey 20</div><div class="hx">#C9C9C9</div></div>
<div class="sw"><div class="chip" style="background:var(--grey-08)"></div><div class="nm">Grey 08</div><div class="hx">#EDEDED</div></div>
<div class="sw"><div class="glass"><span></span></div><div class="nm">Glass</div><div class="hx">rgba · blur 20</div></div>
</div></body></html>
