<!-- @dsCard group="Colors" viewport="700x150" name="Sunrise palette" subtitle="Warm dawn tones — the brand's heart" -->
<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:20px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:88px}
.chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,0.06)}
.nm{font-size:12px;font-variation-settings:'wght' 480;margin-top:7px;letter-spacing:-0.1px}
.hx{font-family:var(--font-mono);font-size:10px;color:var(--grey-40);text-transform:uppercase}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--sun)"></div><div class="nm">Sun</div><div class="hx">#FFD46B</div></div>
<div class="sw"><div class="chip" style="background:var(--peach)"></div><div class="nm">Peach</div><div class="hx">#FFB088</div></div>
<div class="sw"><div class="chip" style="background:var(--coral)"></div><div class="nm">Coral</div><div class="hx">#FF7E8A</div></div>
<div class="sw"><div class="chip" style="background:var(--rose)"></div><div class="nm">Rose</div><div class="hx">#FF4F8E</div></div>
<div class="sw"><div class="chip" style="background:var(--magenta)"></div><div class="nm">Magenta</div><div class="hx">#E84393</div></div>
<div class="sw"><div class="chip" style="background:var(--lilac)"></div><div class="nm">Lilac</div><div class="hx">#C39BFF</div></div>
<div class="sw"><div class="chip" style="background:var(--sky)"></div><div class="nm">Sky</div><div class="hx">#9BC9FF</div></div>
<div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="nm">Cream</div><div class="hx">#FFF3E2</div></div>
<div class="sw"><div class="chip" style="background:var(--berry)"></div><div class="nm">Berry</div><div class="hx">#6E2A6F</div></div>
<div class="sw"><div class="chip" style="background:var(--mint)"></div><div class="nm">Mint</div><div class="hx">#7EEDC9</div></div>
<div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="nm">Amber</div><div class="hx">#FFAA2C</div></div>
</div></body></html>
