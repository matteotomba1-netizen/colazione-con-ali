<!-- @dsCard group="Colors" viewport="700x150" name="Signature gradients" subtitle="Sunrise, warm, cool & rose-text gradients" -->
<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:20px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.g{flex:1;min-width:150px}
.chip{height:72px;border-radius:12px;border:1px solid rgba(0,0,0,0.06)}
.nm{font-size:12px;font-variation-settings:'wght' 480;margin-top:8px}
.tok{font-family:var(--font-mono);font-size:10px;color:var(--grey-40)}
.rose{background:var(--grad-rose);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:30px;font-style:italic;font-variation-settings:'wght' 380;letter-spacing:-0.6px}</style></head>
<body><div class="row">
<div class="g"><div class="chip" style="background:var(--grad-sunrise)"></div><div class="nm">Sunrise</div><div class="tok">--grad-sunrise</div></div>
<div class="g"><div class="chip" style="background:var(--grad-warm)"></div><div class="nm">Warm</div><div class="tok">--grad-warm</div></div>
<div class="g"><div class="chip" style="background:var(--grad-cool)"></div><div class="nm">Cool</div><div class="tok">--grad-cool</div></div>
<div class="g"><div class="chip" style="display:grid;place-items:center;background:#fff;border:1px solid var(--grey-08)"><span class="rose">Vola.</span></div><div class="nm">Rose text</div><div class="tok">--grad-rose</div></div>
</div></body></html>
