<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:24px}
.row{display:flex;gap:18px;align-items:flex-end}
.u{text-align:center}
.bar{background:var(--grad-warm);border-radius:4px;width:26px}
.v{font-family:var(--font-mono);font-size:10px;color:var(--grey-40);margin-top:8px}</style></head>
<body><div class="row">
<div class="u"><div class="bar" style="height:8px"></div><div class="v">8</div></div>
<div class="u"><div class="bar" style="height:16px"></div><div class="v">16</div></div>
<div class="u"><div class="bar" style="height:24px"></div><div class="v">24</div></div>
<div class="u"><div class="bar" style="height:32px"></div><div class="v">32</div></div>
<div class="u"><div class="bar" style="height:40px"></div><div class="v">40</div></div>
<div class="u"><div class="bar" style="height:56px"></div><div class="v">56</div></div>
<div class="u"><div class="bar" style="height:80px"></div><div class="v">80</div></div>
</div></body></html>
