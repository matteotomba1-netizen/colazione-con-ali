<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:24px;color:var(--black)}
.lede{font-size:18px;font-variation-settings:'wght' 340;letter-spacing:-0.18px;color:var(--grey-60);line-height:1.6;margin:0;max-width:560px}
.body{font-size:16px;font-variation-settings:'wght' 340;letter-spacing:-0.18px;line-height:1.5;margin:14px 0 0;max-width:560px}
.mono{font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;margin-top:16px;display:flex;gap:20px;color:var(--grey-40)}
.mono b{color:var(--black);font-weight:500}
.t{font-family:var(--font-mono);font-size:10px;color:var(--grey-20);text-transform:uppercase;letter-spacing:0.6px;margin-top:10px}</style></head>
<body>
<p class="lede">Colazioni che ti fanno alzare dal letto e chilometri che ti fanno sentire viva.</p>
<p class="body">La tua mattina, finalmente con le ali. Ricette overnight, mug cake e prodotti da forno — tutte legate ai Reel.</p>
<div class="mono"><span><b>OVERNIGHT · PROTEICA</b></span><span>FILOSOFIA · 001</span><span>42,195 KM</span></div>
<div class="t">Lede 18 · Body 16 · Mono 11 / +0.6px UPPERCASE</div>
</body></html>
