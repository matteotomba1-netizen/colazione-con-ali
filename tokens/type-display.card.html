<!-- @dsCard group="Type" viewport="700x180" name="Display & headings" subtitle="Inter Variable, negative tracking, italic accents" -->
<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:24px;color:var(--black)}
.hero{font-size:64px;font-variation-settings:'wght' 380;letter-spacing:-2px;line-height:1.0;margin:0}
.acc{font-style:italic;background:var(--grad-rose);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.h2{font-size:36px;font-variation-settings:'wght' 380;letter-spacing:-1.28px;line-height:1.0;margin:18px 0 0}
.h2 em{font-style:italic;font-variation-settings:'wght' 320}
.t{font-family:var(--font-mono);font-size:10px;color:var(--grey-40);text-transform:uppercase;letter-spacing:0.6px;margin-top:4px}</style></head>
<body>
<h1 class="hero">Svegliati. <span class="acc">Mangia.</span> Vola.</h1>
<div class="t">Hero · clamp(64–110px) · wght 380 · -2px</div>
<h2 class="h2">Due mondi, <em>una sola energia.</em></h2>
<div class="t">H2 · clamp(40–64px) · wght 380 / italic 320 · -1.28px</div>
</body></html>
