<!-- @dsCard group="Brand" viewport="700x160" name="Logo mark & focus" subtitle="✦ wordmark + dashed focus ring" -->
<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--white);padding:24px;display:flex;gap:48px;align-items:center;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-variation-settings:'wght' 500;letter-spacing:-0.4px}
.mark{width:32px;height:32px;border-radius:50%;background:var(--black);display:grid;place-items:center;color:var(--white);font-size:16px}
.markw{background:var(--grad-warm)}
.foc{padding:12px 22px;border-radius:50px;background:var(--black);color:#fff;font-size:14px;font-variation-settings:'wght' 500;outline:dashed 2px var(--black);outline-offset:4px;display:inline-block}
.cap{font-family:var(--font-mono);font-size:10px;color:var(--grey-40);text-transform:uppercase;letter-spacing:0.6px;margin-top:10px}</style></head>
<body>
<div><div class="logo"><span class="mark">✦</span><span>Colazione con Ali</span></div><div class="cap">Wordmark · ✦ mark</div></div>
<div><div class="logo"><span class="mark markw">✦</span></div><div class="cap">Gradient mark</div></div>
<div><span class="foc">Inizia a Volare</span><div class="cap">Dashed focus · 4px offset</div></div>
</body></html>
